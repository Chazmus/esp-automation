esphome:
  name: wardrobe-touchscreen
  friendly_name: Wardrobe Touchscreen Dashboard

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  output_power: 12dB

# Home Assistant Native API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

logger:

# 1. Share SPI Bus between Display and Touch Controllers
spi:
  clk_pin: GPIO4
  mosi_pin: GPIO6
  miso_pin: GPIO5

# 2. Configure Display Driver (ILI9341 via ili9xxx platform)
display:
  - platform: ili9xxx
    model: ili9341
    id: wardrobe_tft
    cs_pin: GPIO7
    dc_pin: GPIO10
    reset_pin: GPIO1
    invert_colors: false
    data_rate: 10MHz
    color_palette: 8BIT
    rotation: 90
    pages:
      - id: main_page
        lambda: |-
          // Title
          it.print(10, 10, id(font_large), "Grow Wardrobe Control");
          it.line(10, 35, 310, 35, id(color_white));
          
          // Telemetry states (imported from Home Assistant)
          it.printf(20, 60, id(font_medium), "Air Temp: %.1f °C", id(ha_temp).state);
          it.printf(20, 95, id(font_medium), "Humidity: %.1f %%", id(ha_humidity).state);
          it.printf(20, 130, id(font_medium), "Soil Moisture: %.1f %%", id(ha_moisture).state);

          // Relay state
          if (id(ha_light_switch).state) {
            it.print(20, 175, id(font_medium), id(color_green), "Lights: ON");
          } else {
            it.print(20, 175, id(font_medium), id(color_red), "Lights: OFF");
          }

          // Simple touch target buttons visual boxes
          it.rectangle(180, 55, 120, 50, id(color_white));
          it.print(200, 70, id(font_small), "Toggle Fan");

          it.rectangle(180, 115, 120, 50, id(color_white));
          it.print(195, 130, id(font_small), "Toggle Light");

# 3. Configure Touch Driver (XPT2046)
touchscreen:
  - platform: xpt2046
    id: wardrobe_touch
    cs_pin: GPIO0
    interrupt_pin: GPIO3
    update_interval: 50ms
    threshold: 400
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    calibration:
      x_min: 300
      x_max: 3800
      y_min: 250
      y_max: 3900
    # Map coordinates to Touch Actions
    on_touch:
      - lambda: |-
          // Log raw touch coordinates to assist in calibration
          ESP_LOGI("touch", "Touch detected at x=%d, y=%d, x_raw=%d, y_raw=%d", 
                   (int)touch.x, (int)touch.y, touch.x_raw, touch.y_raw);
          
          // Touch Target 1: Toggle Fan (Region: x 180-300, y 55-105)
          if (touch.x >= 180 && touch.x <= 300 && touch.y >= 55 && touch.y <= 105) {
            id(toggle_fan_action).execute();
          }
          // Touch Target 2: Toggle Light (Region: x 180-300, y 115-165)
          if (touch.x >= 180 && touch.x <= 300 && touch.y >= 115 && touch.y <= 165) {
            id(toggle_light_action).execute();
          }

# 4. Pull Live Sensor States from Home Assistant
sensor:
  - platform: homeassistant
    id: ha_temp
    entity_id: sensor.esp32_growdrobe_temp
    
  - platform: homeassistant
    id: ha_humidity
    entity_id: sensor.esp32_growdrobe_humidity

  - platform: homeassistant
    id: ha_moisture
    entity_id: sensor.esp32_growdrobe_moisture

# 5. Pull Switch States from Home Assistant
binary_sensor:
  - platform: homeassistant
    id: ha_light_switch
    entity_id: light.wardrobe_lightstrip

# 6. Action handlers sending commands back to Home Assistant
script:
  - id: toggle_fan_action
    mode: restart
    then:
      - homeassistant.service:
          service: homeassistant.toggle
          data:
            entity_id: fan.grow_wardrobe_fan
            
  - id: toggle_light_action
    mode: restart
    then:
      - homeassistant.service:
          service: light.toggle
          data:
            entity_id: light.wardrobe_lightstrip

# Fonts and Colors for rendering
font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 20
  - file: "gfonts://Roboto"
    id: font_medium
    size: 16
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

color:
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%
  - id: color_red
    red: 100%
    green: 0%
    blue: 0%
