; PlatformIO project for the ESP32-CAM live feed test device.
; Uses the Arduino framework (not MicroPython) because mainline MicroPython
; has no reliable OV2640 camera driver; the Arduino esp32-camera component
; bundled with the espressif32 platform is the well-trodden path here.

[env:esp32cam]
; Pinned to the Arduino-ESP32 2.x core line: the esp32-camera config struct
; field names (pin_sscb_sda/scl) used in src/main.cpp were renamed to
; pin_sccb_sda/scl in the 3.x core, so floating to "latest" here breaks the build.
platform = espressif32@6.9.0
board = esp32cam
framework = arduino

; ESP32-CAM has no onboard USB; flashing goes through an FTDI adapter.
; Lower baud rates are more reliable over the FTDI's TX/RX wiring.
upload_speed = 115200
monitor_speed = 115200

build_flags =
    -DCAMERA_MODEL_AI_THINKER
