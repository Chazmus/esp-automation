esphome:
  name: cam-test
  friendly_name: Cam Test

esp32:
  board: esp32dev
  framework:
    type: arduino

# AI-Thinker ESP32-CAM boards have 4MB of onboard PSRAM, required for camera frame buffering.
psram:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

# Native Home Assistant integration - exposes the camera entity directly.
api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

# Pinout for AI-Thinker ESP32-CAM boards.
esp32_camera:
  name: Cam Test Live Feed
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32

  resolution: 800x600
  jpeg_quality: 10
  vertical_flip: true
  horizontal_mirror: false
