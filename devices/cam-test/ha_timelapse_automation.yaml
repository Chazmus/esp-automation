# Home Assistant automation: periodic timelapse snapshots for the cam-test camera.
# Copy this into Settings > Automations > Edit in YAML (or paste into automations.yaml),
# after completing the setup steps in docs/camera_timelapse_plan.md (allowlist_external_dirs, etc).

alias: "Cam Test Timelapse Snapshot"
description: "Takes a snapshot of the cam-test camera feed every 30 minutes to record a timelapse."
trigger:
  - platform: time_pattern
    minutes: "/30"
condition:
  # Optional: only take snapshots during daylight hours (e.g. 7 AM to 9 PM)
  - condition: time
    after: "07:00:00"
    before: "21:00:00"
action:
  - service: camera.snapshot
    target:
      entity_id: camera.cam_test_cam_test_live_feed
    data:
      # Saves the files sequentially using timestamp filenames
      filename: "/config/www/timelapse/cam_test/frame_{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg"
mode: single
